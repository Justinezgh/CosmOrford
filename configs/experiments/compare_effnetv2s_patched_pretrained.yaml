# Comparison C3: Patched EfficientNet-V2-S with pretrained weights
# Tests whether pretrained + patching + power spectrum can beat ResNet-18
model:
  class_path: cosmorford.patched_compressor.PatchedCompressorModel
  init_args:
    backbone: "efficientnet_v2_s"
    bottleneck_dim: 8
    warmup_steps: 500
    max_lr: 0.008
    decay_rate: 0.85
    dropout_rate: 0.2
    lr_schedule: "cosine"
    pretrained: true
    use_3channel: false

data:
  class_path: cosmorford.dataset.WLDataModule
  init_args:
    batch_size: 128
    num_workers: 8

trainer:
  max_epochs: 50
  accelerator: gpu
  precision: "16-mixed"
  gradient_clip_val: 1.0
  log_every_n_steps: 1
  check_val_every_n_epoch: 1
  callbacks:
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: "step"
    - class_path: ModelCheckpoint
      init_args:
        monitor: "val_loss"
        mode: "min"
        save_top_k: 3
        save_last: true
    - class_path: EarlyStopping
      init_args:
        monitor: "val_loss"
        patience: 10
        mode: "min"
    - class_path: cosmorford.ema.EMAWeightAveraging
      init_args:
        decay: 0.99
        start_step: 100
  logger:
    class_path: WandbLogger
    init_args:
      name: "C3-effnetv2s-patched-pretrained"
      project: "cosmorford"
      tags: ["comparison", "efficientnet_v2_s", "patched", "pretrained", "ema"]
      log_model: true

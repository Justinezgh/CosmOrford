# Comparison: Power spectrum only baseline
# MLP on 10-bin power spectrum -> 8-dim bottleneck -> Gaussian head
model:
  class_path: cosmorford.ps_compressor.PSCompressorModel
  init_args:
    bottleneck_dim: 8
    hidden_dim: 256
    n_hidden: 3
    warmup_steps: 500
    max_lr: 0.001
    lr_schedule: "cosine"
    dropout_rate: 0.1

data:
  class_path: cosmorford.dataset.WLDataModule
  init_args:
    batch_size: 128
    num_workers: 8

trainer:
  max_epochs: 100
  accelerator: gpu
  precision: "16-mixed"
  gradient_clip_val: 1.0
  log_every_n_steps: 1
  check_val_every_n_epoch: 1
  callbacks:
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: "step"
    - class_path: ModelCheckpoint
      init_args:
        monitor: "val_loss"
        mode: "min"
        save_top_k: 3
        save_last: true
    - class_path: EarlyStopping
      init_args:
        monitor: "val_loss"
        patience: 15
        mode: "min"
  logger:
    class_path: WandbLogger
    init_args:
      name: "C4-ps-only"
      project: "cosmorford"
      tags: ["comparison", "power-spectrum", "mlp-only"]
      log_model: true

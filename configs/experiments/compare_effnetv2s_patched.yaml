# Comparison C2: Old neurips-wl-challenge approach faithfully reproduced
# EfficientNet-V2-S random init, 3-channel repeat, patched + power spectrum, EMA
model:
  class_path: cosmorford.patched_compressor.PatchedCompressorModel
  init_args:
    backbone: "efficientnet_v2_s"
    bottleneck_dim: 8
    warmup_steps: 500
    max_lr: 0.008
    decay_rate: 0.97
    decay_every_epochs: 2
    dropout_rate: 0.2
    lr_schedule: "cosine"
    pretrained: false
    use_3channel: true

data:
  class_path: cosmorford.dataset.WLDataModule
  init_args:
    batch_size: 128
    num_workers: 8

trainer:
  max_epochs: 50
  accelerator: gpu
  precision: "16-mixed"
  gradient_clip_val: 1.0
  log_every_n_steps: 1
  check_val_every_n_epoch: 1
  callbacks:
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: "step"
    - class_path: ModelCheckpoint
      init_args:
        monitor: "val_loss"
        mode: "min"
        save_top_k: 3
        save_last: true
    - class_path: EarlyStopping
      init_args:
        monitor: "val_loss"
        patience: 10
        mode: "min"
    - class_path: cosmorford.ema.EMAWeightAveraging
      init_args:
        decay: 0.99
        start_step: 100
  logger:
    class_path: WandbLogger
    init_args:
      name: "C2-effnetv2s-patched"
      project: "cosmorford"
      tags: ["comparison", "efficientnet_v2_s", "patched", "randominit", "ema"]
      log_model: true

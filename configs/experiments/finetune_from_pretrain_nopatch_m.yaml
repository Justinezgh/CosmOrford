# Configuration for fine-tuning from pretrained checkpoint
# Usage: python -m cosmoford.trainer fit --config configs/finetune_from_pretrain.yaml
#
# IMPORTANT: Update the pretrained_checkpoint_path below to point to your pretrained checkpoint!
# This will load ONLY the weights from the checkpoint while using the hyperparameters
# defined in this config file.

model:
  class_path: cosmoford.models_nopatch.RegressionModelNoPatch
  init_args:
    backbone: "efficientnet_v2_m"
    warmup_steps: 100
    max_lr: 0.002
    decay_rate: 0.8
    decay_every_epochs: 1
    dropout_rate: 0.1
    loss_type: "score"
    # freeze_backbone: true  # Freeze backbone and ps_head, only train final head
    pretrained_checkpoint_path: "checkpoints/last.ckpt"  # UPDATE THIS PATH!

data:
  class_path: cosmoford.dataset.ChallengeDataModule
  init_args:
    batch_size: 64
    num_workers: 12
    dataset_mode: "train"  # Use the regular training dataset

trainer:
  max_epochs: 20  # Fine-tune for 30 epochs
  accelerator: gpu
  precision: "16-mixed"
  log_every_n_steps: 1  
  check_val_every_n_epoch: 1
  accumulate_grad_batches: 2
  callbacks:
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: "step"
    - class_path: EMAWeightAveraging
    - class_path: ModelCheckpoint
      init_args:
        dirpath: "checkpoints/" 
        monitor: "val_score"
        mode: "max"
        save_top_k: 3
        save_last: true
        filename: "finetune-{epoch:02d}-{val_score:.4f}"
  logger:
    class_path: WandbLogger
    init_args:
      name: "finetune_from_pretrain_v2_m"
      project: "neurips-wl-challenge"
      entity: "cosmostat"
      log_model: true

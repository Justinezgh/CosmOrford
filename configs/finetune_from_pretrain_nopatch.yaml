# Configuration for fine-tuning from pretrained checkpoint
# Usage: python -m cosmoford.trainer fit --config configs/finetune_from_pretrain.yaml
#
# IMPORTANT: Update the pretrained_checkpoint_path below to point to your pretrained checkpoint!
# This will load ONLY the weights from the checkpoint while using the hyperparameters
# defined in this config file.

model:
  class_path: cosmoford.models_nopatch.RegressionModelNoPatch
  init_args:
    backbone: "efficientnet_v2_s"
    warmup_steps: 100
    max_lr: 0.003
    decay_rate: 0.8
    decay_every_epochs: 1
    dropout_rate: 0.1
    loss_type: "score"
    # freeze_backbone: true  # Freeze backbone and ps_head, only train final head
    pretrained_checkpoint_path: "checkpoints/model-ot.ckpt" #"checkpoints/last.ckpt"  # UPDATE THIS PATH!
    #pretrained_checkpoint_path: "checkpoints/pretrain-joint-epoch=26-val_score=11.1374.ckpt" #"checkpoints/last.ckpt"  # UPDATE THIS PATH!
    #pretrained_checkpoint_path: "checkpoints/pretrain-gs-92.ckpt" #"checkpoints/last.ckpt"
    # LoRA/PEFT configuration
    use_peft: false
    lora_r: 4
    lora_alpha: 8
    lora_dropout: 0.1
    # lora_target_modules: null  # Auto-detect Conv2d layers (default)

data:
  class_path: cosmoford.dataset.ChallengeDataModule
  init_args:
    batch_size: 128
    num_workers: 12
    dataset_mode: "full"  # Use the regular training dataset

trainer:
  max_epochs: 9  # Fine-tune for 30 epochs
  accelerator: gpu
  precision: "16-mixed"
  log_every_n_steps: 1  
  check_val_every_n_epoch: 1
  callbacks:
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: "step"
    - class_path: cosmoford.trainer.EMAWeightAveraging
    - class_path: ModelCheckpoint
      init_args:
        dirpath: "checkpoints/" 
        monitor: "val_score"
        mode: "max"
        save_top_k: 3
        save_last: true
        filename: "finetune-{epoch:02d}-{val_score:.4f}"
  logger:
    class_path: WandbLogger
    init_args:
      name: "finetune_from_pretrain_ot_lp_v2_s"
      project: "neurips-wl-challenge"
      entity: "cosmostat"
      log_model: true

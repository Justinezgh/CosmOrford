# UNet2DConditionModel configuration for cosmoford emulator
# Keys align with diffusers.UNet2DConditionModel constructor
in_channels: 1
out_channels: 1
# Use simple non-attention UNet by default; can switch to CrossAttn* variants if needed
down_block_types: ["DownBlock2D", "DownBlock2D", "DownBlock2D"]
mid_block_type: "UNetMidBlock2D"
up_block_types: ["UpBlock2D", "UpBlock2D", "UpBlock2D"]
block_out_channels: [32, 64, 128]
layers_per_block: 2
# sample_size (H, W) will be overridden at runtime to match dataset after reshape_field
sample_size: [1834, 88]
# Additional conditioning vector y dimension
y_dim: 3
